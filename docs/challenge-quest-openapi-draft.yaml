openapi: 3.0.3
info:
  title: CHME Challenge-Quest API (Phase 0 Draft)
  version: 0.1.0-draft
  description: >-
    Admin-First 라이브 서비스 구축을 위한 Challenge-Quest API 계약 초안.
servers:
  - url: https://api.example.com

tags:
  - name: Quests
  - name: Verifications
  - name: Admin

paths:
  /challenges/{challengeId}/quests/today:
    get:
      tags: [Quests]
      summary: 오늘 활성 퀘스트 조회
      parameters:
        - $ref: '#/components/parameters/challengeId'
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  quests:
                    type: array
                    items:
                      $ref: '#/components/schemas/Quest'
                  personalQuest:
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/Quest'

  /challenges/{challengeId}/quests:
    get:
      tags: [Quests]
      summary: 챌린지 퀘스트 전체 조회
      parameters:
        - $ref: '#/components/parameters/challengeId'
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  quests:
                    type: array
                    items:
                      $ref: '#/components/schemas/Quest'
    post:
      tags: [Quests]
      summary: 개인 퀘스트 등록
      parameters:
        - $ref: '#/components/parameters/challengeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePersonalQuestRequest'
      responses:
        '200':
          description: 등록 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  questId:
                    type: string
                  status:
                    $ref: '#/components/schemas/QuestStatus'

  /quests/{questId}:
    put:
      tags: [Quests]
      summary: 반려된 개인 퀘스트 수정 재제출
      parameters:
        - $ref: '#/components/parameters/questId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description]
              properties:
                title: { type: string }
                description: { type: string }
      responses:
        '200':
          description: 수정 제출 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  questId: { type: string }
                  status:
                    $ref: '#/components/schemas/QuestStatus'
                  revisionCount: { type: integer, minimum: 0, maximum: 2 }

  /admin/quests/{questId}/approve:
    post:
      tags: [Admin]
      summary: 퀘스트 승인
      parameters:
        - $ref: '#/components/parameters/questId'
      responses:
        '200':
          description: 처리 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /admin/quests/{questId}/reject:
    post:
      tags: [Admin]
      summary: 퀘스트 반려
      parameters:
        - $ref: '#/components/parameters/questId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [feedback]
              properties:
                feedback:
                  type: string
                  minLength: 10
      responses:
        '200':
          description: 처리 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /verifications:
    post:
      tags: [Verifications]
      summary: 인증 제출 (일반/추가)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVerificationRequest'
      responses:
        '200':
          description: 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateVerificationResponse'
        '400': { $ref: '#/components/responses/ValidationError' }

  /verifications/remedy:
    post:
      tags: [Verifications]
      summary: Day 6 보완 인증 제출
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRemedyVerificationRequest'
      responses:
        '200':
          description: 저장 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  verificationId: { type: string }
                  scoreEarned: { type: integer, minimum: 0 }
                  remainingRemedyDays: { type: integer, minimum: 0 }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /verifications/{verificationId}/visibility:
    patch:
      tags: [Verifications]
      summary: 추가 인증 공개 전환
      parameters:
        - $ref: '#/components/parameters/verificationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isPersonalOnly]
              properties:
                isPersonalOnly:
                  type: boolean
                  enum: [false]
      responses:
        '200':
          description: 처리 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

components:
  parameters:
    challengeId:
      name: challengeId
      in: path
      required: true
      schema: { type: string }
    questId:
      name: questId
      in: path
      required: true
      schema: { type: string }
    verificationId:
      name: verificationId
      in: path
      required: true
      schema: { type: string }

  responses:
    ValidationError:
      description: 요청 검증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: 비즈니스 충돌
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    QuestMode:
      type: string
      enum: [leader_only, personal_only, leader_personal, mixed]

    QuestStatus:
      type: string
      enum: [pending, approved, rejected, revision_pending, expired]

    Quest:
      type: object
      required: [questId, challengeId, layer, startDay, endDay, title, points]
      properties:
        questId: { type: string }
        challengeId: { type: string }
        layer:
          type: string
          enum: [A, B, D]
        createdBy:
          type: string
          enum: [leader, user]
        userId:
          type: string
          nullable: true
        target:
          type: string
          enum: [all, self]
        startDay:
          type: integer
          minimum: 1
          maximum: 7
        endDay:
          type: integer
          minimum: 1
          maximum: 7
        title: { type: string }
        description: { type: string }
        verificationType:
          type: string
          enum: [text, image, link, video]
        points: { type: integer, minimum: 0 }
        status:
          $ref: '#/components/schemas/QuestStatus'

    CreatePersonalQuestRequest:
      type: object
      required: [title, description, verificationType]
      properties:
        title: { type: string }
        description: { type: string }
        verificationType:
          type: string
          enum: [text, image, link, video]

    CreateVerificationRequest:
      type: object
      required:
        - userChallengeId
        - questId
        - day
        - todayNote
        - practiceAt
        - targetTime
        - isPublic
        - isAnonymous
      properties:
        userChallengeId: { type: string }
        questId: { type: string }
        day:
          type: integer
          minimum: 1
          maximum: 7
        imageUrl: { type: string, nullable: true }
        todayNote: { type: string }
        tomorrowPromise: { type: string, nullable: true }
        practiceAt:
          type: string
          format: date-time
          description: 사용자 입력 실천 시각
        targetTime: { type: string, format: date-time }
        isPublic: { type: boolean }
        isAnonymous: { type: boolean }

    CreateVerificationResponse:
      type: object
      required: [verificationId, isExtra, scoreEarned, message]
      properties:
        verificationId: { type: string }
        isExtra: { type: boolean }
        scoreEarned: { type: integer }
        delta:
          type: integer
          nullable: true
        cheerOpportunity:
          type: object
          nullable: true
          properties:
            canCheerNow: { type: boolean }
        message: { type: string }
        notice:
          type: string
          nullable: true

    CreateRemedyVerificationRequest:
      type: object
      required: [userChallengeId, questId, originalDay, practiceAt, todayNote, reflectionNote]
      properties:
        userChallengeId: { type: string }
        questId: { type: string }
        originalDay:
          type: integer
          minimum: 1
          maximum: 5
        practiceAt: { type: string, format: date-time }
        todayNote: { type: string }
        reflectionNote: { type: string }

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]

    ErrorResponse:
      type: object
      required: [errorCode, message]
      properties:
        errorCode:
          type: string
          enum:
            - FUTURE_PRACTICE_TIME
            - PRACTICE_TOO_OLD
            - INVALID_DAY
            - REMEDY_WRONG_DAY
            - REMEDY_NO_FAILED_DAYS
            - REMEDY_TOO_MANY_FAILS
            - REMEDY_MAX_REACHED
            - REMEDY_TARGET_INVALID
            - REMEDY_TARGET_ALREADY_DONE
            - REMEDY_QUEST_EXPIRED
        message:
          type: string
